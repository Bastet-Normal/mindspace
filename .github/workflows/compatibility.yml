name: Compatibility and Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: mindspace-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  web-compatibility:
    name: Web compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release metadata
        run: npm run verify:release

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run browser compatibility tests
        run: npm run test:compat

  desktop-packages:
    name: Desktop package (${{ matrix.platform }})
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run desktop:build:win
          - platform: linux
            os: ubuntu-latest
            command: npm run desktop:build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop packages
        run: ${{ matrix.command }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindspace-${{ matrix.platform }}
          path: |
            release/MindSpace-*-Windows-Setup-*.exe
            release/MindSpace-*-Windows-Portable-*.exe
            release/MindSpace-*-Linux-x86_64.AppImage
            release/MindSpace-*-Linux-amd64.deb
          if-no-files-found: error
          retention-days: 7

  android-package:
    name: Android package
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Sync Android project
        run: npm run mobile:sync

      - name: Build Android APK and bundle
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug bundleRelease

      - name: Collect Android artifacts
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/MindSpace-${VERSION}-Android-debug.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "release/MindSpace-${VERSION}-Android-release-unsigned.aab"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindspace-android
          path: release/MindSpace-*-Android-*
          retention-days: 7

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - web-compatibility
      - desktop-packages
      - android-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: mindspace-*
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd release-artifacts
          sha256sum \
            MindSpace-*-Windows-Setup-*.exe \
            MindSpace-*-Windows-Portable-*.exe \
            MindSpace-*-Linux-x86_64.AppImage \
            MindSpace-*-Linux-amd64.deb \
            MindSpace-*-Android-debug.apk \
            MindSpace-*-Android-release-unsigned.aab \
            | sort > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/MindSpace-*-Windows-Setup-*.exe
            release-artifacts/MindSpace-*-Windows-Portable-*.exe
            release-artifacts/MindSpace-*-Linux-x86_64.AppImage
            release-artifacts/MindSpace-*-Linux-amd64.deb
            release-artifacts/MindSpace-*-Android-debug.apk
            release-artifacts/MindSpace-*-Android-release-unsigned.aab
            release-artifacts/SHA256SUMS.txt
