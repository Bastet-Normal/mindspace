name: Compatibility and Packages

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

jobs:
  web-compatibility:
    name: Web compatibility
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run browser compatibility tests
        run: npm run test:compat

  desktop-packages:
    name: Desktop package (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            command: npm run desktop:build:win
          - platform: linux
            os: ubuntu-latest
            command: npm run desktop:build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop packages
        run: ${{ matrix.command }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindspace-${{ matrix.platform }}
          path: release/*

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - web-compatibility
      - desktop-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: mindspace-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/MindSpace-*-Windows-Setup-*.exe
            release-artifacts/MindSpace-*-Windows-Portable-*.exe
            release-artifacts/MindSpace-*-Linux-x86_64.AppImage
            release-artifacts/MindSpace-*-Linux-amd64.deb
