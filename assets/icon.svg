<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">MindSpace icon</title>
  <desc id="desc">A calm Apple-style meditation icon with soft sky rings and a white seated figure.</desc>
  <defs>
    <linearGradient id="bg" x1="102" y1="116" x2="914" y2="910" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A9DCF0"/>
      <stop offset="0.48" stop-color="#AEE4D7"/>
      <stop offset="1" stop-color="#DCEFC4"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="44%" r="44%">
      <stop offset="0" stop-color="#FFF7D5" stop-opacity="0.96"/>
      <stop offset="0.54" stop-color="#FFF0BA" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#FFF7D5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="142" y1="742" x2="878" y2="974" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6CC8DF" stop-opacity="0.68"/>
      <stop offset="0.48" stop-color="#6ED1C4" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#C7EBA8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="figure" x1="384" y1="404" x2="640" y2="902" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.7" stop-color="#FDFDFD"/>
      <stop offset="1" stop-color="#F2F7F8"/>
    </linearGradient>
    <linearGradient id="rim" x1="110" y1="92" x2="898" y2="950" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#245A62" flood-opacity="0.24"/>
    </filter>
    <filter id="softLift" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2C7C88" flood-opacity="0.22"/>
    </filter>
    <filter id="innerGlow" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="round">
      <rect x="20" y="20" width="984" height="984" rx="224"/>
    </clipPath>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="20" y="20" width="984" height="984" rx="224" fill="url(#bg)"/>
  </g>
  <g clip-path="url(#round)">
    <rect x="20" y="20" width="984" height="984" rx="224" fill="url(#bg)"/>
    <circle cx="512" cy="430" r="274" fill="url(#sun)"/>

    <circle cx="512" cy="458" r="382" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.46"/>
    <circle cx="512" cy="458" r="292" fill="#FFFFFF" opacity="0.16"/>
    <circle cx="512" cy="458" r="292" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.45"/>
    <circle cx="512" cy="458" r="206" fill="#FFFFFF" opacity="0.19"/>
    <circle cx="512" cy="458" r="206" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.48"/>

    <path d="M82 760c124-28 218-22 326 4 94 23 161 26 275 0 104-24 189-28 285-3v243H82z" fill="url(#water)" opacity="0.62"/>
    <path d="M161 824c96-16 178-13 250 10 70 22 136 22 218 2 91-23 166-21 244 6" fill="none" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" opacity="0.2"/>
    <path d="M318 883c68-13 132-10 191 8 58 17 115 17 181 1" fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" opacity="0.24"/>

    <g filter="url(#softLift)" fill="url(#figure)">
      <circle cx="512" cy="420" r="54"/>
      <path d="M462 474c0-28 22-50 50-50s50 22 50 50v24c0 20-12 38-30 45l-20 8-20-8c-18-7-30-25-30-45z"/>
      <path d="M410 604c8-56 48-92 102-92s94 36 102 92l22 153H388z"/>
      <path d="M412 646c-53 95-118 145-195 150-23 2-36 18-28 33 9 17 41 23 81 16 84-15 151-69 201-162z"/>
      <path d="M612 646c53 95 118 145 195 150 23 2 36 18 28 33-9 17-41 23-81 16-84-15-151-69-201-162z"/>
      <path d="M329 797c50-31 113-40 183-8 70-32 133-23 183 8 33 20 31 62-8 74-72 22-130 18-175-10-45 28-103 32-175 10-39-12-41-54-8-74z"/>
      <ellipse cx="256" cy="804" rx="32" ry="14"/>
      <ellipse cx="768" cy="804" rx="32" ry="14"/>
    </g>

    <ellipse cx="512" cy="890" rx="128" ry="25" fill="#FFFFFF" opacity="0.3" filter="url(#innerGlow)"/>
    <path d="M804 822c20-7 40-7 60 0" stroke="#FFF6CA" stroke-width="8" stroke-linecap="round" opacity="0.58"/>
    <path d="M162 834c20-7 41-7 61 0" stroke="#FFF6CA" stroke-width="8" stroke-linecap="round" opacity="0.46"/>
  </g>
  <rect x="20" y="20" width="984" height="984" rx="224" fill="none" stroke="url(#rim)" stroke-width="10"/>
  <rect x="26" y="26" width="972" height="972" rx="218" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.44"/>
</svg>
